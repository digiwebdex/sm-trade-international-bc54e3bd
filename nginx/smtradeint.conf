# Nginx config for smtradeint.com
# Place at: /etc/nginx/sites-available/smtradeint.com
# Symlink: ln -s /etc/nginx/sites-available/smtradeint.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name smtradeint.com www.smtradeint.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name smtradeint.com www.smtradeint.com;

    # SSL certificates (use certbot)
    ssl_certificate /etc/letsencrypt/live/smtradeint.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smtradeint.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Frontend static files
    root /var/www/sm-trade-international/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy to backend
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;

        # SSE support for streaming AI quotes
        proxy_buffering off;
        proxy_cache off;
    }

    # Uploaded files proxy
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Cache static frontend assets only
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;
}
